<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마실 — 소원여행 플래너</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: "Pretendard", -apple-system, system-ui, sans-serif; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    input[type=range] { -webkit-appearance: none; height: 6px; border-radius: 99px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #0A84FF; cursor: pointer; box-shadow: 0 2px 8px rgba(10,132,255,.35); }
    textarea:focus, input:focus { border-color: #0A84FF !important; }
    ::-webkit-scrollbar { width: 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    window.__resources = {
      masilAppIcon: "data:image/svg+xml;charset=utf-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" rx="24" fill="#0A84FF"/><text x="50" y="66" text-anchor="middle" font-family="sans-serif" font-size="48">🌿</text></svg>'),
      masilWordmark: "data:image/svg+xml;charset=utf-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="210" height="210" viewBox="0 0 210 210"><text x="105" y="130" text-anchor="middle" font-family="sans-serif" font-size="64" font-weight="900" fill="#2B2D42">마실</text></svg>'),
    };
  </script>

  <script type="text/babel">
// masil-theme.jsx — design tokens + shared UI atoms for the 마실 prototype
// Tokens lifted verbatim from docs/design.md (color system, type, layout).

const T = {
  primary: '#0A84FF', primaryLight: '#E6F2FF', primaryDark: '#0060DF',
  secondary: '#F5A623', secondaryLight: '#FFF3E0',
  bg: '#FAFAFA', white: '#FFFFFF',
  gray100: '#F5F5F5', gray200: '#EEEEEE', gray400: '#BDBDBD',
  gray600: '#757575', gray700: '#616161', gray800: '#424242', gray900: '#212121',
  error: '#E53935', success: '#43A047', warning: '#FFB300', info: '#1E88E5',
  navy: '#2B2D42', navySub: '#8D99AE',
  font: '"Pretendard", -apple-system, system-ui, sans-serif',
  // stamina 1→5
  stamina: ['#E53935', '#FF7043', '#FFB300', '#66BB6A', '#0A84FF'],
  // category spot colors
  cat: { 관광지: '#0A84FF', 음식점: '#FF7043', 카페: '#FF9800', 공원: '#66BB6A', 숙박: '#5C6BC0' },
  PAD: 24,
  topSafe: 60, // clears the iOS status bar inside IOSDevice
};

// ── full-height screen scaffold: scrollable body + optional pinned bottom bar ──
function Screen({ children, bottom, bg = T.bg, scrollRef }) {
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: bg, fontFamily: T.font }}>
      <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
        {children}
      </div>
      {bottom && (
        <div style={{
          padding: '12px 24px 30px', background: bg,
          boxShadow: '0 -4px 16px rgba(0,0,0,0.04)', flexShrink: 0,
        }}>{bottom}</div>
      )}
    </div>
  );
}

// ── top app bar: back chevron + step counter pill ──
function StepBar({ onBack, step, total, label }) {
  return (
    <div style={{
      paddingTop: T.topSafe, padding: `${T.topSafe}px 16px 4px`,
      display: 'flex', alignItems: 'center', gap: 8, minHeight: 44,
    }}>
      <button onClick={onBack} aria-label="back" style={{
        border: 'none', background: 'transparent', cursor: 'pointer',
        width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center',
        marginLeft: -6,
      }}>
        <svg width="11" height="19" viewBox="0 0 11 19" fill="none">
          <path d="M9 2L2 9.5l7 7.5" stroke={T.gray800} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
      <div style={{ flex: 1 }} />
      {step != null && (
        <div style={{
          fontSize: 13, fontWeight: 600, color: T.gray600,
          background: T.gray100, borderRadius: 999, padding: '5px 12px',
        }}>{label || `${step} / ${total}`}</div>
      )}
    </div>
  );
}

// thin progress rail under the step bar
function StepProgress({ step, total }) {
  return (
    <div style={{ height: 3, background: T.gray200, margin: '8px 24px 0', borderRadius: 99, overflow: 'hidden' }}>
      <div style={{
        height: '100%', width: `${(step / total) * 100}%`, background: T.primary,
        borderRadius: 99, transition: 'width 350ms cubic-bezier(.4,0,.2,1)',
      }} />
    </div>
  );
}

// ── big step question + subtitle ──
function StepHead({ title, sub }) {
  return (
    <div style={{ padding: '28px 24px 0' }}>
      <h1 style={{
        margin: 0, fontSize: 25, fontWeight: 700, lineHeight: 1.4,
        color: T.gray900, letterSpacing: -0.4, textWrap: 'balance',
      }}>{title}</h1>
      {sub && <p style={{
        margin: '12px 0 0', fontSize: 15, fontWeight: 400, lineHeight: 1.5,
        color: T.gray600,
      }}>{sub}</p>}
    </div>
  );
}

// ── primary CTA (full width) ──
function PrimaryButton({ children, onClick, disabled, icon }) {
  return (
    <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{
      width: '100%', height: 54, borderRadius: 15, border: 'none',
      background: disabled ? T.gray200 : T.primary,
      color: disabled ? T.gray400 : '#fff',
      fontFamily: T.font, fontSize: 16, fontWeight: 700, letterSpacing: -0.2,
      cursor: disabled ? 'default' : 'pointer',
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      boxShadow: disabled ? 'none' : '0 6px 18px rgba(10,132,255,0.30)',
      transition: 'background 200ms, box-shadow 200ms',
    }}>
      {children}{icon}
    </button>
  );
}

function TextButton({ children, onClick }) {
  return (
    <button onClick={onClick} style={{
      border: 'none', background: 'transparent', cursor: 'pointer',
      fontFamily: T.font, fontSize: 15, fontWeight: 500, color: T.gray400, padding: 8,
    }}>{children}</button>
  );
}

// ── solid single-select chip (5-3) ──
function SolidChip({ selected, onClick, children, full }) {
  return (
    <button onClick={onClick} style={{
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      width: full ? '100%' : undefined, flex: full ? undefined : 1,
      padding: '14px 16px', borderRadius: 14, cursor: 'pointer',
      fontFamily: T.font, fontSize: 15, fontWeight: 600, letterSpacing: -0.2,
      background: selected ? T.primary : T.white,
      color: selected ? '#fff' : T.gray600,
      border: `1.5px solid ${selected ? T.primary : T.gray200}`,
      boxShadow: selected ? '0 6px 16px rgba(10,132,255,0.26)' : 'none',
      transition: 'all 200ms cubic-bezier(.4,0,.2,1)',
    }}>{children}</button>
  );
}

// ── light multi-select chip (5-4) ──
function LightChip({ selected, onClick, children, pill }) {
  return (
    <button onClick={onClick} style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: pill ? '11px 18px' : '12px 16px',
      borderRadius: pill ? 24 : 13, cursor: 'pointer',
      fontFamily: T.font, fontSize: 15, fontWeight: 600, letterSpacing: -0.2,
      background: selected ? T.primaryLight : T.white,
      color: selected ? T.primaryDark : T.gray400,
      border: `1.5px solid ${selected ? T.primary : T.gray200}`,
      transition: 'all 200ms cubic-bezier(.4,0,.2,1)',
    }}>
      {selected && <Check c={T.primary} />}{children}
    </button>
  );
}

function Check({ c = '#fff', size = 15 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M3 8.5l3.2 3.2L13 4.5" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// ── common card (5-12) ──
function Card({ children, style, selected, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: T.white, borderRadius: 16,
      border: `1.5px solid ${selected ? T.primary : T.gray200}`,
      boxShadow: '0 2px 10px rgba(0,0,0,0.04)',
      padding: 16, cursor: onClick ? 'pointer' : 'default',
      transition: 'all 200ms', ...style,
    }}>{children}</div>
  );
}

// ── gradient header card (5-13) ──
function GradientHeader({ children, style }) {
  return (
    <div style={{
      background: 'linear-gradient(135deg, #1A7BFF, #00C2FF)',
      borderRadius: 20, padding: 22, color: '#fff',
      boxShadow: '0 10px 26px rgba(26,148,136,0.28)', ...style,
    }}>{children}</div>
  );
}

// ── striped image placeholder (per design brief — no real images yet) ──
function ImgSlot({ w = '100%', h = 80, r = 12, label, big }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: r, flexShrink: 0,
      backgroundColor: '#EEF2F1',
      backgroundImage: 'repeating-linear-gradient(135deg, rgba(43,191,175,0.10) 0 8px, rgba(43,191,175,0) 8px 16px)',
      border: '1px solid rgba(43,191,175,0.18)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      overflow: 'hidden',
    }}>
      {label && <span style={{
        fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace',
        fontSize: big ? 11 : 9, color: '#7AA8A1', textAlign: 'center',
        padding: 6, lineHeight: 1.4, letterSpacing: -0.2,
      }}>{label}</span>}
    </div>
  );
}

// ── number counter (5-9) ──
function Counter({ value, onChange, min = 1, max = 10, suffix = '명' }) {
  const Btn = ({ d, disabled }) => (
    <button onClick={disabled ? undefined : () => onChange(value + d)} disabled={disabled} style={{
      width: 40, height: 40, borderRadius: 999, cursor: disabled ? 'default' : 'pointer',
      border: 'none', background: disabled ? T.gray200 : T.primary, color: disabled ? T.gray400 : '#fff',
      fontSize: 22, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center',
      lineHeight: 1, paddingBottom: 2,
    }}>{d > 0 ? '+' : '−'}</button>
  );
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <Btn d={-1} disabled={value <= min} />
      <div style={{ fontSize: 28, fontWeight: 700, color: T.primary, fontFamily: T.font }}>
        {value}<span style={{ fontSize: 16, color: T.gray600, fontWeight: 500, marginLeft: 3 }}>{suffix}</span>
      </div>
      <Btn d={1} disabled={value >= max} />
    </div>
  );
}

// ── friendly inline error (5-20) ──
function FriendlyError({ children }) {
  return (
    <div style={{
      display: 'flex', gap: 8, alignItems: 'center', marginTop: 14,
      fontSize: 13.5, color: T.gray700, fontFamily: T.font,
    }}>
      <span style={{ fontSize: 15 }}>💬</span>{children}
    </div>
  );
}

Object.assign(window, {
  T, Screen, StepBar, StepProgress, StepHead, PrimaryButton, TextButton,
  SolidChip, LightChip, Check, Card, GradientHeader, ImgSlot, Counter, FriendlyError,
});
  </script>
  <script type="text/babel">
// masil-flow1.jsx — Splash · Onboarding · Condition (5 steps)
// Relies on window globals from masil-theme.jsx + react.
const { useState, useEffect, useRef } = React;

/* ───────────────────────── SPLASH ───────────────────────── */
function Splash({ onDone }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const a = setTimeout(() => setShow(true), 80);
    const b = setTimeout(onDone, 2200);
    return () => { clearTimeout(a); clearTimeout(b); };
  }, []);
  return (
    <div style={{
      height: '100%', background: T.white, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', fontFamily: T.font,
      opacity: show ? 1 : 0, transition: 'opacity 700ms ease',
    }}>
      {/* content block — shifted 48px above true center */}
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginTop: -48 }}>
        {/* app icon */}
        <img
          src={window.__resources?.masilAppIcon || 'Masil_app_icon.png'}
          alt="마실 앱 아이콘"
          style={{
            width: 100, height: 100, borderRadius: 24,
            boxShadow: '0 14px 36px rgba(10,132,255,0.28)',
          }}
        />
        {/* wordmark — white bg blends with splash white */}
        <img
          src={window.__resources?.masilWordmark || 'Masil_icon.png'}
          alt="마실"
          style={{
            width: 210, height: 210,
            marginTop: -8,
            objectFit: 'contain',
          }}
        />
        {/* subtitle */}
        <div style={{
          fontSize: 14, fontWeight: 400, color: T.navySub,
          marginTop: -4, letterSpacing: -0.1,
        }}>소원여행, 마음껏 실현</div>
      </div>
    </div>
  );
}

/* ─────────────────────── ONBOARDING ─────────────────────── */
const ONB = [
  { bg: '#E8F8F7', emoji: '🌿', title: '몸이 편치 않아도\n괜찮아요', body: ['지금의 체력과 상태에 꼭 맞는 ', { k: '소원여행' }, '을\n마실이 함께 만들어드려요.'] },
  { bg: '#FFF3E0', emoji: '✨', title: '소원을 들려주세요', body: ['AI가 마음속 소원을 분석해\n', { k: '무장애 여행 코스' }, '를 설계해드려요.'] },
  { bg: '#E8EAF6', emoji: '🚐', title: '이동도, 투약도\n걱정 마세요', body: ['이동 거리·보조기기·약 시간을 모두 고려한\n', { k: '안심 일정' }, '을 짜드려요.'] },
  { bg: '#FCE4EC', emoji: '📸', title: '소중한 순간을\n남겨요', body: ['여행지에 ', { k: '타임캡슐' }, '을 남겨\n가족과 따뜻한 추억을 나눠요.'] },
];

function Onboarding({ onDone, style }) {
  const [p, setP] = useState(0);
  const last = p === ONB.length - 1;
  const page = ONB[p];
  const richBody = page.body.map((seg, i) =>
    typeof seg === 'string'
      ? <span key={i}>{seg}</span>
      : <span key={i} style={{ color: T.primary, fontWeight: 700 }}>{seg.k}</span>);

  // visual variants for the hero
  const hero = () => {
    if (style === 'minimal') {
      return <div style={{ fontSize: 72, marginBottom: 8 }}>{page.emoji}</div>;
    }
    if (style === 'illustration') {
      return (
        <ImgSlot w={208} h={208} r={28} big
          label={`일러스트레이션\n— ${page.title.replace('\n', ' ')} —`} />
      );
    }
    // default: emoji-in-colored-circle
    return (
      <div style={{
        width: 180, height: 180, borderRadius: 999, background: page.bg,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'background 350ms ease',
      }}>
        <span style={{ fontSize: 76 }}>{page.emoji}</span>
      </div>
    );
  };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.white, fontFamily: T.font }}>
      {/* skip */}
      <div style={{ paddingTop: T.topSafe, height: 44, display: 'flex', alignItems: 'center', justifyContent: 'flex-end', padding: `${T.topSafe}px 24px 0` }}>
        <span onClick={onDone} style={{ fontSize: 15, fontWeight: 500, color: T.gray400, cursor: 'pointer', opacity: last ? 0 : 1, transition: 'opacity 300ms', padding: 4 }}>건너뛰기</span>
      </div>

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 32px', textAlign: 'center' }}>
        {hero()}
        <h1 style={{ margin: '36px 0 0', fontSize: 26, fontWeight: 700, lineHeight: 1.4, color: T.gray900, whiteSpace: 'pre-line', letterSpacing: -0.4 }}>{page.title}</h1>
        <p style={{ margin: '16px 0 0', fontSize: 15, lineHeight: 1.8, color: T.gray600, whiteSpace: 'pre-line' }}>{richBody}</p>
      </div>

      {/* dots + cta */}
      <div style={{ padding: '0 24px 30px' }}>
        <div style={{ display: 'flex', gap: 7, justifyContent: 'center', marginBottom: 24 }}>
          {ONB.map((_, i) => (
            <div key={i} style={{
              height: 7, borderRadius: 99, transition: 'all 300ms',
              width: i === p ? 22 : 7, background: i === p ? T.primary : T.gray200,
            }} />
          ))}
        </div>
        <PrimaryButton
          onClick={() => last ? onDone() : setP(p + 1)}
          icon={last ? <span style={{ fontSize: 17 }}>♥</span> : null}>
          {last ? '소원여행 시작하기' : '다음'}
        </PrimaryButton>
      </div>
    </div>
  );
}

/* ─────────────────────── CONDITION ─────────────────────── */
const DIST = [
  { id: 'near', emoji: '🚶', label: '가까운 마실', meta: '약 5km 이내', km: 5 },
  { id: 'mid', emoji: '🚗', label: '무리 없는 외출', meta: '10~15km', km: 15 },
  { id: 'day', emoji: '🗺️', label: '하루 여행', meta: '20km 이상', km: 25 },
];
const AID = [
  { id: 'none', emoji: '🚶', label: '미사용' },
  { id: 'wheel', emoji: '♿', label: '휠체어' },
  { id: 'walker', emoji: '🦯', label: '보행보조기' },
];
const MEDS = [
  { id: 'am', emoji: '🌞', label: '오전' },
  { id: 'pm', emoji: '🌤️', label: '오후' },
  { id: 'night', emoji: '🌙', label: '야간' },
];
const STAMINA = [
  { n: 1, desc: '입맛이 없고\n일어나기 힘들어요' },
  { n: 2, desc: '조금 피곤하고\n움직이기 귀찮아요' },
  { n: 3, desc: '보통이에요,\n무난하게 다닐 수 있어요' },
  { n: 4, desc: '컨디션\n괜찮아요' },
  { n: 5, desc: '컨디션\n좋아요!' },
];
const STAMINA_FACE = ['😣', '😕', '😐', '🙂', '😄'];

function Condition({ onDone, onBack, staminaStyle }) {
  const [step, setStep] = useState(1);
  const total = 5;
  const [dist, setDist] = useState(null);
  const [showSlider, setShowSlider] = useState(false);
  const [sliderKm, setSliderKm] = useState(8);
  const [aid, setAid] = useState(null);
  const [meds, setMeds] = useState([]);
  const [manualMed, setManualMed] = useState(false);
  const [stam, setStam] = useState(null);
  const [people, setPeople] = useState(2);
  const [guardian, setGuardian] = useState(null);
  const [car, setCar] = useState(null);
  const [tried, setTried] = useState(false);

  const next = () => {
    const ok = { 1: dist, 2: aid, 3: meds.length || manualMed, 4: stam, 5: guardian != null && car != null }[step];
    if (!ok) { setTried(true); return; }
    setTried(false);
    if (step < total) setStep(step + 1); else onDone();
  };
  const back = () => { if (step > 1) { setStep(step - 1); setTried(false); } else onBack(); };
  const toggleMed = (id) => setMeds(m => m.includes(id) ? m.filter(x => x !== id) : [...m, id]);

  const stepUI = {
    1: (
      <div style={{ padding: '24px 24px 0', display: 'flex', flexDirection: 'column', gap: 12 }}>
        {DIST.map(d => (
          <SolidChip key={d.id} full selected={dist === d.id} onClick={() => setDist(d.id)}>
            <span style={{ fontSize: 19 }}>{d.emoji}</span>
            <span style={{ flex: 1, textAlign: 'left', marginLeft: 4 }}>{d.label}</span>
            <span style={{ fontSize: 13, fontWeight: 500, opacity: dist === d.id ? 0.85 : 1, color: dist === d.id ? '#fff' : T.gray400 }}>{d.meta}</span>
          </SolidChip>
        ))}
        {dist && (
          <div style={{ background: T.primaryLight, borderRadius: 12, padding: '13px 16px', fontSize: 14, color: T.primaryDark, fontWeight: 500 }}>
            약 {showSlider ? sliderKm : DIST.find(d => d.id === dist).km}km 이내로 장소를 찾아드릴게요
          </div>
        )}
        <button onClick={() => setShowSlider(s => !s)} style={{ border: 'none', background: 'transparent', color: T.gray400, fontSize: 13.5, fontWeight: 600, cursor: 'pointer', alignSelf: 'flex-start', padding: '4px 0', fontFamily: T.font }}>
          {showSlider ? '− 직접 조정 닫기' : '+ 직접 조정'}
        </button>
        {showSlider && (
          <div style={{ padding: '4px 2px 0' }}>
            <input type="range" min="1" max="50" value={sliderKm} onChange={e => setSliderKm(+e.target.value)}
              style={{ width: '100%', accentColor: T.primary }} />
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: T.gray400, marginTop: 2 }}>
              <span>1km</span><span style={{ color: T.primary, fontWeight: 700 }}>{sliderKm}km</span><span>50km</span>
            </div>
          </div>
        )}
        {tried && !dist && <div style={{ padding: '0 0' }}><FriendlyError>아직 선택하지 않으셨어요! 하나만 골라주시면 바로 시작할게요 :)</FriendlyError></div>}
      </div>
    ),

/* mini calendar — June 2026, tap to set range */
function Calendar({ range, onPick }) {
  const year = 2026, month = 5; // June (0-indexed)
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < first; i++) cells.push(null);
  for (let d = 1; d <= days; d++) cells.push(d);
  const pick = (d) => {
    if (!range.start || (range.start && range.end)) onPick({ start: d, end: null });
    else if (d < range.start) onPick({ start: d, end: null });
    else onPick({ start: range.start, end: d });
  };
  const inRange = (d) => range.start && range.end && d > range.start && d < range.end;
  const isEnd = (d) => d === range.start || d === range.end;
  return (
    <Card style={{ padding: 18 }}>
      <div style={{ textAlign: 'center', fontSize: 16, fontWeight: 700, color: T.gray900, marginBottom: 14 }}>2026년 6월</div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2, marginBottom: 6 }}>
        {['일', '월', '화', '수', '목', '금', '토'].map((w, i) => (
          <div key={w} style={{ textAlign: 'center', fontSize: 12, fontWeight: 600, color: i === 0 ? T.error : i === 6 ? T.info : T.gray400, padding: '2px 0' }}>{w}</div>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2 }}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} />;
          const end = isEnd(d), mid = inRange(d);
          return (
            <button key={i} onClick={() => pick(d)} style={{
              aspectRatio: '1', border: 'none', cursor: 'pointer', fontFamily: T.font, fontSize: 14, fontWeight: end ? 700 : 500,
              borderRadius: 999,
              background: end ? T.primary : mid ? T.primaryLight : 'transparent',
              color: end ? '#fff' : mid ? T.primaryDark : (i % 7 === 0 ? T.error : T.gray800),
              transition: 'all 150ms',
            }}>{d}</button>
          );
        })}
      </div>
    </Card>
  );
}

function PlanLoading({ onDone }) {
  const [msg, setMsg] = useS2(0);
  const [prev, setPrev] = useS2(0);

  useE2(() => {
    const m = setInterval(() => setMsg(v => (v + 1) % LOAD_MSGS.length), 2000);

  }, []);
  return (

            <div style={{ display: 'inline-block', fontSize: 11, fontWeight: 600, color: T.primary, background: T.primaryLight, borderRadius: 6, padding: '2px 8px' }}>{PREVIEWS[prev].tag}</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.gray900, marginTop: 6 }}>{PREVIEWS[prev].name}</div>
            <div style={{ fontSize: 13, color: T.gray600, marginTop: 3 }}>{PREVIEWS[prev].desc}</div>
          </div>
        </Card>
        <div style={{ display: 'flex', gap: 6, justifyContent: 'center', marginTop: 14 }}>
          {PREVIEWS.map((_, i) => <div key={i} style={{ width: i === prev ? 18 : 6, height: 6, borderRadius: 99, background: i === prev ? T.primary : T.gray200, transition: 'all 300ms' }} />)}
        </div>
      </div>
      <div style={{ padding: '0 24px 40px' }}>
        <div style={{ height: 6, borderRadius: 99, background: T.gray200, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${pct}%`, background: T.primary, borderRadius: 99, transition: 'width 280ms linear' }} />
        </div>
        <div style={{ textAlign: 'center', fontSize: 12, color: T.gray400, marginTop: 8 }}>{pct}%</div>
      </div>
    </div>
  );
}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;

}

function TweakText({ label, value, placeholder, onChange }) {

             onChange={(e) => onChange(e.target.value)} />

}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',

      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',

        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',

      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>

          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

    frd: 'F05-05 ~ F05-10', section: '실행·공유', title: '타임캡슐 — 콘텐츠 작성',
    purpose: '음성·편지·사진 + 열람 가족 지정 → Firebase Storage 업로드 → Geofencing 등록 → 1년 보관.',
    data: [
      '🎤 음성 최대 2분 — POST /time-capsules/{id}/attachments 로 storage URL 발급',
      '✉️ 편지 텍스트 — text_body 직접 저장',
      '📷 사진 최대 3장 — storage_objects.object_key',
      '열람 가족 — time_capsule_recipients.family_user_id',
      'unlock_radius_meters: 100m · expires_at: +1년',
      '저장소 추상화: storage_objects (FIREBASE_STORAGE | S3_COMPATIBLE)',
    ],
    service: '파일 → POST /attachments (업로드 URL 발급) → Firebase Storage 업로드 → Geofencing 등록 → FCM 알림(열람 가족)',
    api: { method: 'POST', endpoint: '/api/v1/time-capsules' },
    db: `time_capsules(id, trip_plan_stop_id FK, location geography, unlock_radius_meters, expires_at +1year)
time_capsule_contents(id, time_capsule_id FK, content_type ENUM(VOICE/LETTER/PHOTO), text_body TEXT, storage_object_id FK nullable)
time_capsule_recipients(id, time_capsule_id FK, family_user_id FK, unlocked_at, viewed_at)
storage_objects(id, provider ENUM(FIREBASE_STORAGE/S3_COMPATIBLE), bucket, object_key, mime_type, size_bytes, delete_after)`,
    req: `{
  "tripPlanStopId": 3001,
  "location": { "latitude": 37.771, "longitude": 128.947 },
  "unlockRadiusMeters": 100,
  "recipients": [{ "familyUserId": 2 }]
}`,
    res: `{ "data": { "capsuleId": 4001, "status": "SEALED", "expiresAt": "2027-06-14T00:00:00+09:00" } }`,
  },
};

/* ───── FLOW SECTIONS ───── */
const SECTIONS = [
  { id: '의료조건', screens: ['condition'] },
  { id: '소원입력', screens: ['wish'] },
  { id: 'AI 생성',  screens: ['loading'] },
  { id: '플랜결과', screens: ['plan'] },
  { id: '실행·공유', screens: ['checkin', 'capsule-spots', 'capsule-write'] },
];
const SCREEN_SEC = {
  condition: '의료조건', wish: '소원입력', loading: 'AI 생성',
  plan: '플랜결과', checkin: '실행·공유', 'capsule-spots': '실행·공유', 'capsule-write': '실행·공유',
};

/* ───── FLOW STRIP ───── */
function FlowStrip({ screen, go }) {
  const cur = SCREEN_SEC[screen];
  return (
    <div style={{
      height: 50, background: '#fff', borderBottom: `1px solid ${T.gray200}`,
      display: 'flex', alignItems: 'center', padding: '0 20px', gap: 2,
      flexShrink: 0, overflowX: 'auto', WebkitOverflowScrolling: 'touch',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginRight: 16, flexShrink: 0 }}>
        <div style={{ width: 22, height: 22, borderRadius: 7, background: T.primary, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13 }}>🌿</div>
        <span style={{ fontSize: 14, fontWeight: 700, color: T.navy }}>마실</span>
      </div>
      {SECTIONS.map((sec, i) => (
        <React.Fragment key={sec.id}>
          {i > 0 && <svg width="14" height="14" style={{ flexShrink: 0 }} viewBox="0 0 14 14"><path d="M3 7h8M8 4l3 3-3 3" stroke={T.gray400} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none" /></svg>}
          <button onClick={() => go(sec.screens[0])} style={{
            padding: '6px 13px', borderRadius: 999, border: 'none', cursor: 'pointer',
            fontFamily: T.font, fontSize: 12.5, fontWeight: 600, whiteSpace: 'nowrap', flexShrink: 0,
            background: cur === sec.id ? T.primary : 'transparent',
            color: cur === sec.id ? '#fff' : T.gray600,
            transition: 'all 180ms',
          }}>{sec.id}</button>
        </React.Fragment>
      ))}
      <div style={{ flex: 1, minWidth: 16 }} />
      <button onClick={() => go('splash')} style={{
        padding: '6px 13px', borderRadius: 999, border: `1px solid ${T.gray200}`, background: 'transparent',
        cursor: 'pointer', fontFamily: T.font, fontSize: 12, fontWeight: 600, color: T.gray400, whiteSpace: 'nowrap', flexShrink: 0,
      }}>처음으로</button>
    </div>
  );
}

/* ───── HANDOFF PANEL ───── */
function HandoffPanel({ screen }) {
  const [tab, setTab] = useSA('data');
  const d = HANDOFF[screen];
  useEA(() => setTab('data'), [screen]);

  if (!d) return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', gap: 10, fontFamily: T.font }}>
      <span style={{ fontSize: 32 }}>👆</span>
      <span style={{ fontSize: 14, color: T.gray400 }}>화면을 탭하면 설계 정보가 표시돼요</span>
    </div>
  );

  const METHOD_COLOR = { GET: T.info, POST: T.success, PUT: T.warning, DELETE: T.error };
  const TABS = [{ id: 'data', label: '화면 데이터' }, { id: 'service', label: '서비스 흐름' }, { id: 'api', label: 'API' }, { id: 'db', label: 'DB' }];

  const tabBody = {
    data: (
      <ul style={{ margin: 0, padding: '0 0 0 16px', display: 'flex', flexDirection: 'column', gap: 9 }}>
        {d.data.map((item, i) => <li key={i} style={{ fontSize: 13, color: T.gray700, lineHeight: 1.55 }}>{item}</li>)}
      </ul>
    ),
    service: (
      <div style={{ fontSize: 13, color: T.gray700, lineHeight: 1.85, whiteSpace: 'pre-line' }}>{d.service}</div>
    ),
    api: d.api ? (
      <div>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: T.gray100, borderRadius: 9, padding: '8px 12px', marginBottom: 14 }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: '#fff', background: METHOD_COLOR[d.api.method] || T.gray600, borderRadius: 5, padding: '2px 8px' }}>{d.api.method}</span>
          <code style={{ fontSize: 12.5, color: T.navy, fontFamily: 'ui-monospace,"SF Mono",Menlo,monospace' }}>{d.api.endpoint}</code>
        </div>
        {d.req && <><div style={{ fontSize: 11, fontWeight: 700, color: T.gray400, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>요청 Body</div><JsonBlock>{d.req}</JsonBlock></>}
        {d.res && <><div style={{ fontSize: 11, fontWeight: 700, color: T.gray400, textTransform: 'uppercase', letterSpacing: 0.5, margin: '12px 0 6px' }}>응답 Body</div><JsonBlock>{d.res}</JsonBlock></>}
        {!d.req && !d.res && <div style={{ fontSize: 13, color: T.gray400, fontStyle: 'italic' }}>body 없음</div>}
      </div>
    ) : <div style={{ fontSize: 13, color: T.gray400, fontStyle: 'italic' }}>이 화면에서는 API 호출이 없어요</div>,
    db: (
      <pre style={{ margin: 0, fontSize: 12, lineHeight: 1.75, fontFamily: 'ui-monospace,"SF Mono",Menlo,monospace', color: T.navy, whiteSpace: 'pre-wrap', wordBreak: 'break-word', background: T.gray100, borderRadius: 10, padding: '12px 14px' }}>{d.db || '—'}</pre>
    ),
  };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.white, borderLeft: `1px solid ${T.gray200}`, fontFamily: T.font, overflow: 'hidden' }}>
      {/* header */}
      <div style={{ padding: '18px 20px 14px', borderBottom: `1px solid ${T.gray100}`, flexShrink: 0 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: T.primary, letterSpacing: 0.5, marginBottom: 5 }}>{d.frd} · {d.section}</div>
        <div style={{ fontSize: 19, fontWeight: 700, color: T.navy, marginBottom: 6 }}>{d.title}</div>
        <div style={{ fontSize: 13, color: T.gray600, lineHeight: 1.55 }}>{d.purpose}</div>
      </div>
      {/* tabs */}
      <div style={{ display: 'flex', borderBottom: `1px solid ${T.gray200}`, flexShrink: 0 }}>
        {TABS.map(tb => (
          <button key={tb.id} onClick={() => setTab(tb.id)} style={{
            flex: 1, height: 38, border: 'none', cursor: 'pointer', fontFamily: T.font,
            fontSize: 12, fontWeight: 600, background: 'transparent',
            color: tab === tb.id ? T.primary : T.gray400,
            borderBottom: `2px solid ${tab === tb.id ? T.primary : 'transparent'}`,
            transition: 'all 180ms',
          }}>{tb.label}</button>
        ))}
      </div>
      {/* body */}
      <div style={{ flex: 1, padding: '16px 20px', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
        {tabBody[tab]}
      </div>
      {/* doc links */}
      <div style={{ borderTop: `1px solid ${T.gray100}`, padding: '10px 20px', display: 'flex', gap: 8, flexShrink: 0 }}>
        {['API 계약', 'DB 명세', 'FRD 문서'].map(l => (
          <span key={l} style={{ fontSize: 12, fontWeight: 600, color: T.primary, background: T.primaryLight, borderRadius: 8, padding: '4px 12px', cursor: 'pointer' }}>{l}</span>
        ))}
      </div>
    </div>
  );
}

function JsonBlock({ children }) {
  return (
    <pre style={{
      margin: 0, fontSize: 11.5, lineHeight: 1.7,
      background: '#1E2030', color: '#A8D8B8',
      borderRadius: 10, padding: '12px 14px',
      fontFamily: 'ui-monospace,"SF Mono",Menlo,monospace',
      whiteSpace: 'pre-wrap', wordBreak: 'break-word', overflowX: 'auto',
    }}>{children}</pre>
  );
}

/* ───── TWEAKS ───── */
const TWEAK_DEFAULTS = { onboardingStyle: 'emoji', staminaStyle: 'bar', planLayout: 'timeline' };

/* ───── APP ───── */
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useSA(() => localStorage.getItem('masil.screen') || 'splash');
  const [capsuleSpots, setCapsuleSpots] = useSA([]);
  const [phoneScale, setPhoneScale] = useSA(1);
  const [phoneColW, setPhoneColW] = useSA(440);
  const [isWide, setIsWide] = useSA(window.innerWidth > 860);
  const STRIP = 50, PW = 402, PH = 874;

  useEA(() => { localStorage.setItem('masil.screen', screen); }, [screen]);
  useEA(() => {
    const fit = () => {
      const ww = window.innerWidth, wh = window.innerHeight;
      const wide = ww > 860;
      setIsWide(wide);
      const col = wide ? Math.min(440, Math.round(ww * 0.43)) : ww;
      setPhoneColW(col);
      setPhoneScale(Math.min(1, (col - 28) / PW, (wh - STRIP - 28) / PH));
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  const go = (s) => setScreen(s);

  const body = () => {
    switch (screen) {
      case 'splash':         return <Splash onDone={() => go('onboarding')} />;
      case 'onboarding':     return <Onboarding style={t.onboardingStyle} onDone={() => go('condition')} />;
      case 'condition':      return <Condition staminaStyle={t.staminaStyle} onBack={() => go('onboarding')} onDone={() => go('wish')} />;
      case 'wish':           return <Wish onBack={() => go('condition')} onDone={() => go('loading')} />;
      case 'loading':        return <PlanLoading onDone={() => go('plan')} />;
      case 'plan':           return <PlanResult layout={t.planLayout} onBack={() => go('wish')} onCapsule={() => go('capsule-spots')} onCheckin={() => go('checkin')} />;
      case 'checkin':        return <ConditionCheckin onBack={() => go('plan')} onPlan={() => go('plan')} />;
      case 'capsule-spots':  return <TimeCapsuleSpots onBack={() => go('plan')} onNext={(s) => { setCapsuleSpots(s); go('capsule-write'); }} />;
      case 'capsule-write':  return <TimeCapsuleWrite spots={capsuleSpots} onBack={() => go('capsule-spots')} onDone={() => go('plan')} />;
      default: return null;
    }
  };

  const jump = (label, s) => <TweakButton label={label} onClick={() => go(s)} />;

  return (
    <div style={{ width: '100vw', height: '100vh', display: 'flex', flexDirection: 'column', background: '#eef1f0', overflow: 'hidden' }}>
      <FlowStrip screen={screen} go={go} />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* phone column */}
        <div style={{ width: phoneColW, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
          <div style={{ transform: `scale(${phoneScale})`, transformOrigin: 'center' }}>
            <IOSDevice>{body()}</IOSDevice>
          </div>
        </div>
        {/* handoff column — desktop only */}
        {isWide && (
          <div style={{ flex: 1, minWidth: 0, overflow: 'hidden' }}>
            <HandoffPanel screen={screen} />
          </div>
        )}
      </div>

      <TweaksPanel>
        <TweakSection label="온보딩 일러스트 스타일" />
        <TweakRadio label="온보딩" value={t.onboardingStyle} options={['emoji', 'illustration', 'minimal']}
          onChange={v => { setTweak('onboardingStyle', v); go('onboarding'); }} />

        <TweakSection label="체력·컨디션 입력 UI" />
        <TweakRadio label="체력 입력" value={t.staminaStyle} options={['bar', 'slider', 'faces']}
          onChange={v => { setTweak('staminaStyle', v); go('condition'); }} />

        <TweakSection label="플랜 리스트 스타일" />
        <TweakRadio label="리스트" value={t.planLayout} options={['timeline', 'cards', 'compact']}
          onChange={v => { setTweak('planLayout', v); go('plan'); }} />

        <TweakSection label="화면 바로가기" />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {jump('스플래시', 'splash')}
          {jump('온보딩', 'onboarding')}
          {jump('컨디션', 'condition')}
          {jump('소원', 'wish')}
          {jump('로딩', 'loading')}
          {jump('플랜 결과', 'plan')}
          {jump('체크인', 'checkin')}
          {jump('타임캡슐', 'capsule-spots')}
        </div>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
