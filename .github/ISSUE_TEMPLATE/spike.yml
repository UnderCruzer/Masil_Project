name: 기술 검증 Spike
description: 구현 전에 기술 가능성이나 방향을 검증할 때 사용합니다.
title: "[SPIKE] "
labels: ["type: spike"]
body:
  - type: markdown
    attributes:
      value: |
        Spike는 기능 구현이 아니라 기술 검증/조사 작업입니다.
        결과물은 코드 완성이 아니라 "결정 근거"입니다.
        예: 네이버맵 원형 오버레이 가능 여부 확인, TourAPI 응답 필드 확인

  - type: textarea
    id: question
    attributes:
      label: 검증 질문
      description: 무엇을 확인하려는 작업인가요?
      placeholder: "예: flutter_naver_map으로 현재 위치 기준 반경 원 3개를 지도에 표시할 수 있는가?"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 검증이 필요한 이유
      description: 왜 바로 구현하지 않고 먼저 검증해야 하나요?
      placeholder: "예: 지도 SDK에서 원형 오버레이가 안정적으로 동작해야 에너지 버블 맵을 구현할 수 있습니다."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 검증 범위
      description: 어디까지 확인하면 충분한지 적어주세요.
      placeholder: |
        - 네이버맵 초기화
        - 마커 3개 표시
        - 반경 원 3개 표시
        - Android 에뮬레이터에서 지도 표시 확인
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: Spike가 끝났다고 판단할 기준을 적어주세요.
      placeholder: |
        - [ ] 검증 결과를 댓글 또는 문서로 정리했다.
        - [ ] 가능/불가능 여부를 판단했다.
        - [ ] 선택 가능한 대안을 적었다.
        - [ ] 다음 작업 이슈를 제안했다.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - priority: p0
        - priority: p1
        - priority: p2
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 관련 영역
      options:
        - area: app
        - area: backend
        - area: api
        - area: planner
        - area: infra
    validations:
      required: true

  - type: input
    id: timebox
    attributes:
      label: 제한 시간
      description: Spike는 오래 끌면 안 됩니다. 검증에 쓸 시간을 정하세요.
      placeholder: "예: 2시간, 하루, 이번 주 금요일까지"
    validations:
      required: true

  - type: textarea
    id: result-format
    attributes:
      label: 결과 정리 방식
      description: 검증 결과를 어디에 남길지 적어주세요.
      placeholder: |
        예:
        - 이슈 댓글에 결과 정리
        - docs/decisions/ADR-002-map-provider.md에 반영
        - 다음 구현 이슈 생성
