name: 버그 수정
description: 오류나 의도와 다른 동작을 수정할 때 사용합니다.
title: "[BUG] "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 수정 이슈입니다.
        재현 방법을 최대한 구체적으로 적어주세요.

  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어떤 문제가 발생했는지 적어주세요.
      placeholder: "예: 의료 조건 입력 후 다음 버튼을 눌러도 소원 입력 화면으로 이동하지 않습니다."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 같은 문제를 다시 확인할 수 있는 순서를 적어주세요.
      placeholder: |
        1. 앱 실행
        2. 의료 조건 입력 화면 진입
        3. 이동거리 선택
        4. 다음 버튼 클릭
        5. 화면 이동이 되지 않음
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 원래 어떻게 동작해야 하나요?
      placeholder: "예: 다음 버튼 클릭 시 소원 입력 화면으로 이동해야 합니다."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      description: 실제로는 어떻게 동작했나요?
      placeholder: "예: 버튼 클릭 후 아무 반응이 없습니다."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - priority: p0
        - priority: p1
        - priority: p2
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 발생 영역
      options:
        - area: app
        - area: backend
        - area: api
        - area: planner
        - area: infra
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 실행 환경
      description: 문제가 발생한 환경을 적어주세요.
      placeholder: "예: iPhone Simulator / Android Emulator / Chrome / macOS"

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷 또는 로그
      description: 가능하면 스크린샷, 에러 로그, 콘솔 출력을 붙여주세요.
      render: shell
