name: 기능 구현
description: 새로운 기능을 구현할 때 사용합니다.
title: "[FRD-ID] "
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        기능 구현 이슈입니다.
        제목에는 가능하면 FRD ID를 포함하세요.
        예: [F01-01] 이동거리 선택 UI 구현

  - type: input
    id: frd-id
    attributes:
      label: 관련 요구사항 ID
      description: FRD에 있는 기능 ID를 적어주세요.
      placeholder: "예: F01-01, F03-05, N-01"
    validations:
      required: false

  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 이 기능이 왜 필요한지 적어주세요.
      placeholder: "예: 사용자가 이동 가능 거리를 입력해야 TourAPI 조회 반경을 정할 수 있습니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 내용
      description: 구현해야 할 작업을 적어주세요.
      placeholder: |
        - 이동거리 선택 UI 구현
        - 선택값 Riverpod 상태 저장
        - 다음 화면 이동 시 값 전달
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 이 이슈가 끝났다고 판단할 수 있는 기준을 체크박스로 적어주세요.
      placeholder: |
        - [ ] 이동거리 값이 상태에 저장된다.
        - [ ] 뒤로 갔다 돌아와도 입력값이 유지된다.
        - [ ] 필수값 미입력 시 안내 문구가 표시된다.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: MVP에 얼마나 중요한 작업인지 선택하세요.
      options:
        - priority: p0
        - priority: p1
        - priority: p2
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 작업 영역
      options:
        - area: app
        - area: backend
        - area: api
        - area: planner
        - area: infra
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 화면 목업, 문서, API 문서, 회의 내용 등이 있으면 적어주세요.
      placeholder: |
        - FRD v1.1:
        - Figma:
        - API 문서:

  - type: textarea
    id: risk
    attributes:
      label: 예상 리스크
      description: 막힐 수 있는 부분이나 미리 결정해야 하는 내용을 적어주세요.
      placeholder: "예: 이동거리 기본값을 0km로 둘지 5km로 둘지 결정 필요"
